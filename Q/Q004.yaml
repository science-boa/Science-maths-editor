question:
  text: "A radio wave travels at a speed of $3.0 \\times 10\u2078 \\text{ m/s}$ and\
    \ has a frequency of $1.5 \\times 10\u2076 \\text{ Hz}$. Calculate the wavelength\
    \ of the wave in metres."
  variables:
  - name: wave_speed
    value: 300000000.0
  - name: frequency
    value: 1500000.0
solution:
  final_answer: '200.0'
  marks_available: 3
  steps:
  - step_number: 1
    text: 'Rearrange the wave equation $v = f \times \lambda$ to solve for wavelength:
      $\lambda = \frac{v}{f}$.'
    marks_assigned: 1
    check_type: none
    milestone_value: 0.0
    tolerance: 0.0
  - step_number: 2
    text: "Substitute the given values into the equation: $\\lambda = \\frac{3.0 \\\
      times 10\u2078}{1.5 \\times 10\u2076}$."
    marks_assigned: 1
    check_type: numeric
    milestone_value: 200.0
    tolerance: 0.1
  - step_number: 3
    text: 'Calculate the result: $\lambda = 200 \text{ m}$.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 200.0
    tolerance: 0.1
