id: PHYS-2026-001
metadata:
  topic: Mechanical Energy
  marks: 4
  difficulty_level: 0.5
question:
  text: A pinball launcher uses a spring mechanism to propel a ball. The spring has
    a spring constant of $1200\text{ N/m}$. To launch the ball, the spring is compressed
    by $15\text{ cm}$. Calculate the elastic potential energy stored in the compressed
    spring. State the unit in your final answer.
  variables: []
solution:
  final_answer: 13.5
  marks_available: 4
  steps:
  - step_number: 1
    text: 'Convert the compression from centimeters to meters: $e = \frac{15}{100}
      = 0.15\text{ m}$.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 0.15
    tolerance: 0.001
  - step_number: 2
    text: "Substitute the values into the elastic potential energy equation and calculate\
      \ the square of the extension: $e\xB2 = 0.15\xB2 = 0.0225\\text{ m}\xB2$."
    marks_assigned: 1
    check_type: numeric
    milestone_value: 0.0225
    tolerance: 0.0001
  - step_number: 3
    text: 'Calculate the final numerical energy value: $E_e = 0.5 \times 1200 \times
      0.0225 = 13.5$.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 13.5
    tolerance: 0.01
  - step_number: 4
    text: 'State the correct unit for energy: $\text{J}$ or Joules.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 13.5
    tolerance: 0.0
