id: Q005
metadata:
  topic: Waves
  marks: 3
  difficulty_level: 0.4
question:
  text: "An ultrasound wave travels through human tissue at a speed of $1500 \\text{\
    \ m/s}$ and has a frequency of $2.5 \\times 10\u2074 \\text{ Hz}$. Calculate the\
    \ wavelength of the wave in metres."
  variables:
  - name: wave_speed
    value: 1500.0
  - name: frequency
    value: 25000.0
solution:
  final_answer: '0.06'
  marks_available: 3
  steps:
  - step_number: 1
    text: 'Rearrange the wave equation $v = f \times \lambda$ to solve for wavelength:
      $\lambda = \frac{v}{f}$.'
    marks_assigned: 1
    check_type: none
    milestone_value: 0.0
    tolerance: 0.0
  - step_number: 2
    text: 'Substitute the given values into the equation: $\lambda = \frac{1500}{25000}$.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 0.06
    tolerance: 0.001
  - step_number: 3
    text: 'Calculate the result: $\lambda = 0.06 \text{ m}$.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 0.06
    tolerance: 0.001
