id: PHYS-2026-001
metadata:
  topic: Thermal Energy and Density
  marks: 4
  difficulty_level: 0.5
question:
  text: "A block of copper is heated by transferring $150\\text{ kJ}$ of energy to\
    \ it. The block has a volume of $0.002\\text{ m}\xB3$ and a density of $8900\\\
    text{ kg/m}\xB3$. Given that the specific heat capacity of copper is $390\\text{\
    \ J/kg}^{\\circ}\\text{C}$ and the initial temperature is $20^{\\circ}\\text{C}$,\
    \ calculate the final temperature of the copper block."
  variables:
  - substance: copper
  - initial_temperature: "20\xB0C"
  - energy_change: 150 kJ
  - density: "8900 kg/m\xB3"
  - volume: "0.002 m\xB3"
  - specific_heat_capacity: "390 J/kg\xB0C"
solution:
  step_by_step:
  - 'Step 1: Calculate mass using $m = \rho \times V$. $m = 8900 \times 0.002 = 17.8\text{
    kg}$.'
  - 'Step 2: Rearrange $\Delta E = mc\Delta\theta$ to solve for $\Delta\theta$: $\Delta\theta
    = \frac{\Delta E}{mc}$.'
  - 'Step 3: Calculate $\Delta\theta$. Convert $150\text{ kJ}$ to $150,000\text{ J}$.
    $\Delta\theta = \frac{150,000}{17.8 \times 390} \approx 21.6^{\circ}\text{C}$.'
  - 'Step 4: Determine final temperature: $T_{final} = T_{initial} + \Delta\theta
    = 20 + 21.6 = 41.6^{\circ}\text{C}$.'
  final_answer: "41.6\xB0C"
