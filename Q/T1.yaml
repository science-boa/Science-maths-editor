id: T1
metadata:
  topic: Thermal Physics and Density
  marks: 4
  difficulty_level: 0.5
question:
  text: "A block of copper is heated. Using the data provided, calculate the final\
    \ temperature of the block. Data: Substance = Copper, Initial Temperature = 20\
    \ \xB0C, Energy change = 150 kJ, Density = 8960 kg/m\xB3, Volume = 0.002 m\xB3\
    , Specific heat capacity = 385 J/kg\xB0C."
  variables:
  - name: substance
    value: Copper
  - name: initial_temperature
    value: 20
  - name: energy_change_kJ
    value: 150
  - name: density
    value: 8960
  - name: volume
    value: 0.002
  - name: specific_heat_capacity
    value: 385
solution:
  final_answer: 63.53
  marks_available: 4
  steps:
  - step_number: 1
    text: "Calculate the mass: m = density \xD7 volume = 8960 \xD7 0.002 = 17.92 kg"
    marks_assigned: 1
    check_type: numeric
    milestone_value: 17.92
    tolerance: 0.001
  - step_number: 2
    text: 'Convert energy to Joules: 150 kJ = 150,000 J'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 150000
    tolerance: 0.001
  - step_number: 3
    text: "Rearrange \u0394E = mc\u0394\u03B8 to find \u0394\u03B8: \u0394\u03B8 =\
      \ \u0394E / (mc) = 150,000 / (17.92 \xD7 385) \u2248 21.74 \xB0C"
    marks_assigned: 1
    check_type: numeric
    milestone_value: 21.74
    tolerance: 0.05
  - step_number: 4
    text: "Determine final temperature: T_final = T_initial + \u0394\u03B8 = 20 +\
      \ 21.74 = 41.74 \xB0C"
    marks_assigned: 1
    check_type: numeric
    milestone_value: 41.74
    tolerance: 0.05
