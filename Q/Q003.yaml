id: Q003
metadata:
  topic: Elastic Potential Energy
  marks: 4
  difficulty_level: 0.5
question:
  text: A pinball launcher uses a spring mechanism to project a ball. The spring has
    a spring constant of $1200\text{ N/m}$ and is compressed by $5\text{ cm}$. Calculate
    the elastic potential energy stored in the compressed spring. State the unit in
    your final answer.
  variables: []
solution:
  final_answer: 1.5
  marks_available: 4
  steps:
  - step_number: 1
    text: 'Convert the compression from centimeters to meters: $e = \frac{5}{100}
      = 0.05\text{ m}$.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 0.05
    tolerance: 0.001
  - step_number: 2
    text: "Substitute the values into the formula $E_e = 0.5 \\times k \\times e\xB2\
      $ to square the compression: $0.05\xB2 = 0.0025\\text{ m}\xB2$."
    marks_assigned: 1
    check_type: numeric
    milestone_value: 0.0025
    tolerance: 0.0001
  - step_number: 3
    text: 'Calculate the final numerical value of the energy: $E_e = 0.5 \times 1200
      \times 0.0025 = 1.5$.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 1.5
    tolerance: 0.01
  - step_number: 4
    text: 'State the correct unit for energy: Joules ($\text{J}$).'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 1.5
    tolerance: 0.0
