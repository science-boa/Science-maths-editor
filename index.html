<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics & Maths Quiz Platform</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 antialiased font-sans">

  <div class="max-w-6xl mx-auto px-4 py-8">
    <header class="mb-8 border-b border-gray-200 pb-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Physics Quiz Terminal</h1>
      <span id="loading-badge" class="bg-amber-100 text-amber-800 text-xs font-semibold px-3 py-1 rounded-full animate-pulse">Loading Questions...</span>
    </header>

    <div id="dashboard" class="flex gap-2 mb-6 overflow-x-auto pb-2"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 space-y-6">
        <div id="question-card" class="bg-white p-6 rounded-xl shadow-xs border border-gray-200 min-h-[300px]">
          <div class="text-gray-400 text-center py-20">Awaiting URL parameters...</div>
        </div>

        <div class="flex justify-between items-center pt-2">
          <button id="btn-prev" onclick="changeQuestion(-1)" class="px-5 py-2 bg-gray-200 hover:bg-gray-300 disabled:opacity-40 font-medium rounded-lg transition-colors cursor-pointer" disabled>
            ← Previous
          </button>
          <button id="btn-next" onclick="changeQuestion(1)" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors cursor-pointer">
            Next →
          </button>
          <button id="btn-submit" onclick="submitQuiz()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg transition-colors hidden cursor-pointer">
            Submit Quiz
          </button>
        </div>
      </div>

      <div class="space-y-6">
        <div class="bg-gray-900 text-white p-4 rounded-xl shadow-md border border-gray-800">
          <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Onscreen Calculator</h3>
          <input id="calc-display" type="text" class="w-full bg-gray-800 border border-gray-700 text-right font-mono text-xl p-2 rounded mb-3 text-emerald-400" readonly value="0">
          <div class="grid grid-cols-4 gap-2 text-sm font-bold">
            <button onclick="pressCalc('C')" class="bg-rose-700 hover:bg-rose-600 p-3 rounded transition-colors cursor-pointer">C</button>
            <button onclick="pressCalc('/')" class="bg-gray-700 hover:bg-gray-600 p-3 rounded transition-colors cursor-pointer">/</button>
            <button onclick="pressCalc('*')" class="bg-gray-700 hover:bg-gray-600 p-3 rounded transition-colors cursor-pointer">*</button>
            <button onclick="pressCalc('-')" class="bg-gray-700 hover:bg-gray-600 p-3 rounded transition-colors cursor-pointer">-</button>
            <button onclick="pressCalc('7')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">7</button>
            <button onclick="pressCalc('8')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">8</button>
            <button onclick="pressCalc('9')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">9</button>
            <button onclick="pressCalc('+')" class="bg-gray-700 hover:bg-gray-600 p-3 rounded transition-colors col-span-1 row-span-2 flex items-center justify-center cursor-pointer">+</button>
            <button onclick="pressCalc('4')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">4</button>
            <button onclick="pressCalc('5')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">5</button>
            <button onclick="pressCalc('6')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">6</button>
            <button onclick="pressCalc('1')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">1</button>
            <button onclick="pressCalc('2')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">2</button>
            <button onclick="pressCalc('3')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">3</button>
            <button onclick="pressCalc('=')" class="bg-emerald-600 hover:bg-emerald-500 p-3 rounded transition-colors col-span-1 row-span-2 flex items-center justify-center cursor-pointer">=</button>
            <button onclick="pressCalc('0')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors col-span-2 cursor-pointer">0</button>
            <button onclick="pressCalc('.')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded transition-colors cursor-pointer">.</button>
          </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200">
          <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Persistent Working Area</h3>
          <textarea id="scratchpad" oninput="saveScratchpad()" placeholder="Type your equations, formulas, and numeric calculations here..." class="w-full h-44 p-3 font-mono text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none bg-amber-50/30"></textarea>
          <span class="text-[10px] text-gray-400 block mt-1">✓ Instantly saved to local storage for this question.</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    const BASE_RAW_URL = "https://raw.githubusercontent.com/science-boa/Science-maths-editor/main/Q/";
    let questions = [];
    let currentIndex = 0;
    let studentAnswers = {};
    let calcExpression = "";

    // 1. App initialization: Parse URLs and Fetch YAML sequences
    window.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const qKeys = Array.from(params.keys()).filter(k => k.startsWith('q')).sort();

      if (qKeys.length === 0) {
        document.getElementById('question-card').innerHTML = `
          <div class="text-center py-12">
            <p class="text-red-500 font-semibold text-lg">No configuration payload detected.</p>
            <p class="text-sm text-gray-500 mt-2">Append target files to your browser window address bar string: <code class="bg-gray-100 p-1 rounded font-mono text-xs">?q1=PHYS-2026-001</code></p>
          </div>`;
        document.getElementById('loading-badge').classList.add('hidden');
        return;
      }

      for (const key of qKeys) {
        const fileId = params.get(key);
        if (!fileId) continue;
        try {
          const response = await fetch(`${BASE_RAW_URL}${fileId}.yaml`);
          if (!response.ok) throw new Error(`Status ${response.status}`);
          const text = await response.text();
          const parsed = jsyaml.load(text);
          questions.push({ ...parsed, id: fileId });
        } catch (err) {
          questions.push({ id: fileId, error: true, message: `Failed fetching asset index details: ${err.message}` });
        }
      }

      document.getElementById('loading-badge').classList.add('hidden');
      buildDashboard();
      renderCurrentQuestion();
    });

    // 2. Dashboard UI Generator
    function buildDashboard() {
      const container = document.getElementById('dashboard');
      container.innerHTML = '';
      questions.forEach((q, idx) => {
        const btn = document.createElement('button');
        btn.innerText = `Q${idx + 1}`;
        btn.className = `px-4 py-2 text-sm font-semibold rounded-lg border transition-all cursor-pointer ${
          idx === currentIndex 
            ? 'bg-blue-600 border-blue-600 text-white shadow-xs' 
            : 'bg-white border-gray-200 hover:bg-gray-50 text-gray-700'
        }`;
        btn.onclick = () => { currentIndex = idx; renderCurrentQuestion(); };
        container.appendChild(btn);
      });
    }

    // 3. Main State Content Renderer
    function renderCurrentQuestion() {
      buildDashboard();
      const card = document.getElementById('question-card');
      const q = questions[currentIndex];

      if (!q) return;
      if (q.error) {
        card.innerHTML = `<div class="text-red-500 font-medium">⚠️ ${q.message} (${q.id})</div>`;
        return;
      }

      // Check for structural media fields
      let diagramHtml = '';
      if (q.media && q.media.diagram_url) {
        diagramHtml = `
          <div class="mb-6 border border-gray-200 bg-gray-100 rounded-lg w-full h-48 flex items-center justify-center overflow-hidden">
            <img src="${BASE_RAW_URL}${q.media.diagram_url}" alt="Question Diagram" class="object-contain h-full w-full" onerror="this.parentElement.innerHTML='<span class=\'text-xs text-gray-400\'>Diagram Image Reference Broken: ${q.media.diagram_url}</span>'">
          </div>`;
      }

      // Populate interactive HTML
      card.innerHTML = `
        <div class="text-xs font-bold text-blue-600 tracking-wider uppercase mb-1">${q.metadata?.topic || 'General Science'}</div>
        <h2 class="text-xl font-bold text-gray-900 mb-4">Question ID: ${q.id}</h2>
        ${diagramHtml}
        <div id="math-text" class="text-base leading-relaxed text-gray-800 mb-6 font-normal">${q.question.text}</div>
        
        <div class="mt-6 pt-4 border-t border-gray-100 flex items-center gap-4">
          <label class="font-semibold text-gray-700 shrink-0">Your Answer:</label>
          <input type="number" id="answer-input" step="any" value="${studentAnswers[q.id] || ''}" oninput="captureAnswer(this.value)" placeholder="Enter numeric calculation value" class="border border-gray-300 rounded-lg px-3 py-2 w-48 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none font-mono">
          <span class="text-xs text-gray-400 italic">Do not include trailing system unit metrics</span>
        </div>`;

      // Trigger standard LaTeX conversion via safe parsing delimiters
      renderMathInElement(document.getElementById('math-text'), {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false }
        ]
      });

      // Synchronize input tracking states
      document.getElementById('btn-prev').disabled = (currentIndex === 0);
      if (currentIndex === questions.length - 1) {
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-submit').classList.remove('hidden');
      } else {
        document.getElementById('btn-next').classList.remove('hidden');
        document.getElementById('btn-submit').classList.add('hidden');
      }

      // Reload local storage values into workspace scratchpad text element
      document.getElementById('scratchpad').value = localStorage.getItem(`scratchpad-${q.id}`) || '';
    }

    // 4. Data Sync Bindings
    function captureAnswer(val) {
      const q = questions[currentIndex];
      studentAnswers[q.id] = val;
    }

    function saveScratchpad() {
      const q = questions[currentIndex];
      const val = document.getElementById('scratchpad').value;
      localStorage.setItem(`scratchpad-${q.id}`, val);
    }

    function changeQuestion(dir) {
      currentIndex += dir;
      renderCurrentQuestion();
    }

    // 5. Native Built-In Math Grader Logic
    function submitQuiz() {
      let score = 0;
      let breakdown = "";

      questions.forEach((q, idx) => {
        if (q.error) return;
        const studentRaw = studentAnswers[q.id];
        const correctRaw = q.solution.final_answer;

        // Strip non-numeric/text qualifiers from standard final answer string data
        const correctNum = parseFloat(correctRaw.replace(/[^0-9.-]/g, ''));
        const studentNum = parseFloat(studentRaw);

        let pass = false;
        if (!isNaN(correctNum) && !isNaN(studentNum)) {
          if (studentNum === correctNum) {
            pass = true;
          } else {
            // Evaluates mathematical percentage discrepancies against threshold (3 sig figs rounding)
            const deviation = Math.abs((studentNum - correctNum) / correctNum);
            if (deviation <= 0.005) pass = true;
          }
        }

        if (pass) score++;
        breakdown += `Q${idx + 1} (${q.id}): ${pass ? '✓ Correct' : '✗ Incorrect'} (Entered: ${studentRaw || 'None'}, Target: ${correctRaw})\n`;
      });

      alert(`Quiz Results Evaluated!\n\nScore: ${score} / ${questions.length}\n\n${breakdown}`);
    }

    // 6. Basic Calculator Subroutine Interpreter
    function pressCalc(char) {
      const display = document.getElementById('calc-display');
      if (char === 'C') {
        calcExpression = "";
        display.value = "0";
      } else if (char === '=') {
        try {
          // Evaluation occurs localized to standard operations formatting sanitization
          if (calcExpression === "") return;
          let result = eval(calcExpression);
          // Standard display formatting truncation
          if (result % 1 !== 0) result = parseFloat(result.toFixed(4));
          display.value = result;
          calcExpression = result.toString();
        } catch (e) {
          display.value = "Error";
          calcExpression = "";
        }
      } else {
        calcExpression += char;
        display.value = calcExpression;
      }
    }
  </script>
</body>
</html>
