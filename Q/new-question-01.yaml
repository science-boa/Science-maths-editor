question_text: 'A student heats $0.0020\text{ m}^3$ of water in an electric kettle.
  The water has an initial temperature of $15.0^\circ\text{C}$. During the heating
  process, $168\text{ kJ}$ of thermal energy is transferred to the water.


  Calculate the final temperature of the water.


  Given:

  - Density of water = $1000\text{ kg/m}^3$

  - Specific heat capacity of water = $4200\text{ J/kg}^\circ\text{C}$'
