<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maths for Science</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.js"></script>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <style>
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 antialiased font-sans">

  <div class="max-w-7xl mx-auto px-4 py-8">
    <header class="mb-8 border-b border-gray-200 pb-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Maths for Science</h1>
      <span id="loading-badge" class="bg-amber-100 text-amber-800 text-xs font-semibold px-3 py-1 rounded-full animate-pulse">Loading Questions...</span>
    </header>

    <div id="dashboard" class="flex gap-2 mb-6 overflow-x-auto pb-2"></div>

    <div id="quiz-workspace" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-200 space-y-6">
          <div id="question-area"><div class="text-gray-400 text-center py-16">Awaiting URL parameters...</div></div>
          <div id="working-area" class="pt-4 border-t border-gray-100 hidden">
            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Working</h3>
            <textarea id="scratchpad" oninput="saveScratchpad()" placeholder="Type your equations, formulas, and numeric calculations here..." class="w-full h-44 p-3 font-mono text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none bg-amber-50/30"></textarea>
          </div>
          <div id="answer-area" class="pt-4 border-t border-gray-100 hidden">
            <div class="flex items-center gap-4">
              <label class="font-semibold text-gray-700 shrink-0">Your Answer:</label>
              <input type="number" id="answer-input" step="any" oninput="captureAnswer(this.value)" placeholder="Enter numeric value" class="border border-gray-300 rounded-lg px-3 py-2 w-48 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none font-mono">
            </div>
          </div>
        </div>
        <div class="flex justify-between items-center pt-2">
          <button id="btn-prev" onclick="changeQuestion(-1)" class="px-5 py-2 bg-gray-200 hover:bg-gray-300 disabled:opacity-40 font-medium rounded-lg transition-colors cursor-pointer" disabled>← Previous</button>
          <button id="btn-next" onclick="changeQuestion(1)" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors cursor-pointer">Next →</button>
          <button id="btn-submit" onclick="submitQuiz()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg transition-colors hidden cursor-pointer">Submit Quiz</button>
        </div>
      </div>
      <div class="space-y-6">
        <!-- Calculator placeholder remains same -->
      </div>
    </div>

    <div id="quiz-results-screen" class="hidden max-w-4xl mx-auto space-y-8">
      <div class="bg-gradient-to-r from-emerald-600 to-teal-700 text-white p-8 rounded-2xl shadow-md text-center">
        <h2 class="text-3xl font-extrabold tracking-tight">Quiz Assessment Completed</h2>
        <div class="mt-4 inline-block bg-white/20 backdrop-blur-md px-6 py-2 rounded-full font-mono text-2xl font-bold">
          Total Score: <span id="results-score-badge">0 / 0</span>
        </div>
      </div>
      <div id="results-cards-container" class="space-y-6"></div>
      <div class="text-center pb-12">
        <button onclick="triggerPayload()" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg cursor-pointer">Save Results to System</button>
      </div>
    </div>
  </div>

  <script>
    const BASE_RAW_URL = "https://raw.githubusercontent.com/science-boa/Science-maths-editor/main/";
    const POWER_AUTOMATE_URL = null; // Set to null for display mode

    let questions = [];
    let currentIndex = 0;
    let studentAnswers = {};
    let userID = null;
    let startTime = null;
    let calcExpression = "";
    let lastAnswer = 0;
    let finalResultsSummary = null;

    window.addEventListener('DOMContentLoaded', async () => {
      startTime = Date.now();
      const params = new URLSearchParams(window.location.search);
      userID = params.get('u');
      const qKeys = Array.from(params.keys()).filter(k => k.startsWith('q')).sort();
      if (qKeys.length === 0) return;
      for (const key of qKeys) {
        const fileId = params.get(key);
        if (!fileId) continue;
        const response = await fetch(`${BASE_RAW_URL}Q/${fileId}.yaml`);
        const text = await response.text();
        questions.push({ ...jsyaml.load(text), id: fileId });
      }
      document.getElementById('loading-badge').classList.add('hidden');
      renderCurrentQuestion();
    });

    // ... [Rendering functions remain same as previous state] ...

    function submitQuiz() {
      const time_taken = Math.round((Date.now() - startTime) / 1000);
      let grandTotalEarned = 0, grandTotalPossible = 0;
      let resultsArr = [];

      questions.forEach((q, idx) => {
        let earned = 0, max = 0;
        const structuredSteps = (q.solution && Array.isArray(q.solution.steps)) ? q.solution.steps : [];
        structuredSteps.forEach(s => max += parseInt(s.marks_assigned || 1));
        // ... [Evaluation logic remains] ...
        // Simplified for brevity in snippet, logic flows as existing:
        resultsArr.push({ question_id: q.id, score: earned, max_marks: max });
        grandTotalEarned += earned; grandTotalPossible += max;
      });

      finalResultsSummary = { userID, KEY: "29031977", time_taken, results: resultsArr };
      // ... [Show result UI] ...
    }

    async function triggerPayload() {
      if (!POWER_AUTOMATE_URL) {
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50";
        modal.innerHTML = `<div class="bg-white p-6 rounded-xl max-w-lg w-full max-h-[80vh] overflow-auto"><h3 class="font-bold mb-4">Payload (Preview Mode)</h3><pre class="bg-gray-100 p-4 rounded text-xs">${JSON.stringify(finalResultsSummary, null, 2)}</pre><button onclick="this.parentElement.parentElement.remove()" class="mt-4 bg-gray-800 text-white px-4 py-2 rounded">Close</button></div>`;
        document.body.appendChild(modal);
      } else {
        await fetch(POWER_AUTOMATE_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(finalResultsSummary) });
      }
    }
  </script>
</body>
</html>
