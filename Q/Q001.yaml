id: Q001
metadata:
  topic: Thermodynamics
  marks: 4
  difficulty_level: 0.5
question:
  text: "A cup contains $250 \\text{ ml}$ of coffee, which has a density of $1000\
    \ \\text{ kg/m}\xB3$ and a specific heat capacity of $4180 \\text{ J/(kg}\\cdot\\\
    text{K)}$. If the internal energy of the coffee increases by $15,000 \\text{ J}$\
    \ starting from an initial temperature of $20^\\circ\\text{C}$, calculate the\
    \ final temperature of the coffee in degrees Celsius. Assume the density of coffee\
    \ is approximately that of water."
  variables:
  - name: volume
    value: 0.00025
  - name: density
    value: 1000
  - name: c
    value: 4180
  - name: delta_U
    value: 15000
  - name: T_initial
    value: 20
solution:
  final_answer: 34.358
  marks_available: 4
  steps:
  - step_number: 1
    text: "Calculate the mass of the coffee using $m = \\rho \\times V = 1000 \\text{\
      \ kg/m}\xB3 \\times 0.00025 \\text{ m}\xB3 = 0.25 \\text{ kg}$."
    marks_assigned: 1
    check_type: numeric
    milestone_value: 0.25
    tolerance: 0.001
  - step_number: 2
    text: 'Rearrange the heat equation $\Delta U = mc\Delta T$ to solve for the change
      in temperature: $\Delta T = \frac{\Delta U}{mc}$.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 14.358
    tolerance: 0.01
  - step_number: 3
    text: Substitute the values to find $\Delta T = \frac{15000}{0.25 \times 4180}
      \approx 14.358^\circ\text{C}$.
    marks_assigned: 1
    check_type: numeric
    milestone_value: 14.358
    tolerance: 0.01
  - step_number: 4
    text: 'Add the change in temperature to the initial temperature: $T_f = T_i +
      \Delta T = 20 + 14.358 = 34.358^\circ\text{C}$.'
    marks_assigned: 1
    check_type: numeric
    milestone_value: 34.358
    tolerance: 0.01
